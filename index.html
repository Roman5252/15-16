<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Мета-теги для PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">
    
    <!-- Ссылки на иконки для iOS и Android -->
    <link rel="apple-touch-icon" href="/icons/spirit2.ico">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    
    <!-- Иконка вкладки (favicon) -->
    <link rel="icon" href="/icons/spirit.ico" type="image/ico">
</head>
<body>
    <!-- Шапка приложения (App Shell) -->
    <header>
        <h1>А вот и «Заметки» <span class="no-break"></span></h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
    </header>

    <!-- Основной контейнер для динамического контента -->
    <main id="app-content" class="container" style="margin-top: 2rem;">
        <!-- Сюда будет загружаться контент из папки content/ -->
    </main>

    <!-- Кнопки управления push-уведомлениями (Практика 16) -->
    <footer class="is-center" style="margin: 2rem 0;">
        <button id="enable-push" class="button success">Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">Отключить уведомления</button>
    </footer>

    <!-- Подключаем клиентскую часть Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Основной скрипт приложения -->
    <script src="app.js"></script>
</body>
</html>
